<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Barbearia Da Hora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='imagens/Logo branca.png') }}" alt="Barbearia Da Hora" class="logo">
        </a>
    </header>

    <a href="{{ url_for('index') }}" class="link-home">Home</a>

    <h2 class="titulo-tela">CADASTRE-SE</h2>

    <div class="cadastro-container">
        <h3 style="font-style: italic; margin-bottom: 20px;">Faça já sua conta!</h3>
        
        <form action="{{ url_for('cadastro') }}" method="POST">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div class="form-group">
                <label for="confirma_senha">Confirme sua Senha:</label>
                <input type="password" id="confirma_senha" name="confirma_senha" required>
            </div>
            
            <button type="submit" class="btn-amarelo" style="margin-top: 20px;">CRIAR CONTA</button>
        </form>
    </div>
</body>
</html>
